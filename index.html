<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextMind AI | Dastan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); padding: 40px; border-radius: 24px; width: 100%; max-width: 600px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { text-align: center; background: linear-gradient(to right, #818cf8, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; font-size: 2.2rem; }
        .key-box { margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px dashed #475569; }
        label { font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 8px; }
        input, textarea { width: 100%; background: #0f172a; border: 2px solid #334155; border-radius: 12px; color: #fff; padding: 14px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--accent); }
        textarea { height: 180px; margin-top: 10px; font-size: 16px; }
        button { width: 100%; padding: 16px; margin-top: 15px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #4f46e5; transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #result { margin-top: 25px; padding: 20px; background: rgba(56, 189, 248, 0.1); border-radius: 16px; border-left: 4px solid var(--accent); display: none; }
        footer { margin-top: 30px; text-align: center; color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>TextMind AI</h1>
    
    <div class="key-box">
        <label><i class="fas fa-key"></i> Вставьте ваш API Ключ (hf_...):</label>
        <input type="password" id="apiKey" placeholder="Вставьте ключ сюда">
    </div>

    <textarea id="inputText" placeholder="Вставьте текст, главную мысль которого нужно найти..."></textarea>
    <button id="btn" onclick="runAI()">Найти главную мысль</button>

    <div id="result">
        <b style="color:var(--accent); text-transform: uppercase; font-size: 0.8rem;">Результат анализа:</b>
        <p id="summaryText" style="line-height: 1.6; margin-top: 10px;"></p>
    </div>

    <footer>
        <p>Разработчик: <b>Дастан Курманбаев</b></p>
    </footer>
</div>

<script>
    // Загрузка ключа из памяти браузера
    const keyInput = document.getElementById('apiKey');
    keyInput.value = localStorage.getItem('hf_key') || '';

    async function runAI() {
        const key = keyInput.value.trim();
        const text = document.getElementById('inputText').value.trim();
        const btn = document.getElementById('btn');
        const summaryText = document.getElementById('summaryText');
        const resultDiv = document.getElementById('result');

        if (!key.startsWith('hf_')) {
            alert("Пожалуйста, введите рабочий ключ от Hugging Face (начинается с hf_).");
            return;
        }

        if (text.length < 30) {
            alert("Текст слишком короткий!");
            return;
        }

        localStorage.setItem('hf_key', key);
        btn.disabled = true;
        btn.innerText = "Анализирую...";

        try {
            const response = await fetch("https://api-inference.huggingface.co/models/IlyaGusev/mbart_ru_sum_gazeta", {
                method: "POST",
                headers: { 
                    "Authorization": "Bearer " + key, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({ inputs: text })
            });

            const data = await response.json();

            if (data.error && data.error.includes("loading")) {
                btn.innerText = "ИИ просыпается (около 10 сек)...";
                setTimeout(runAI, 5000);
                return;
            }

            if (response.ok && data[0] && data[0].summary_text) {
                resultDiv.style.display = 'block';
                summaryText.innerText = data[0].summary_text;
            } else {
                alert("Ошибка от ИИ: " + (data.error || "Неизвестная ошибка"));
            }
        } catch (e) {
            alert("Ошибка сети! Проверьте интернет или попробуйте сменить браузер.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Найти главную мысль";
        }
    }
</script>

</body>
</html>
