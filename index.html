<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextMind AI | Рабочая версия</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); padding: 40px; border-radius: 24px; width: 100%; max-width: 600px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { text-align: center; background: linear-gradient(to right, #818cf8, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .key-box { margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        input, textarea { width: 100%; background: #0f172a; border: 2px solid #334155; border-radius: 12px; color: #fff; padding: 12px; box-sizing: border-box; outline: none; }
        textarea { height: 150px; margin-top: 10px; }
        button { width: 100%; padding: 15px; margin-top: 15px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: rgba(56, 189, 248, 0.1); border-radius: 12px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>TextMind AI</h1>
    
    <div class="key-box">
        <label style="font-size: 0.8rem; color: #94a3b8;">API Ключ Hugging Face:</label>
        <input type="password" id="apiKey" placeholder="hf_...">
        <p style="font-size: 0.7rem; color: #64748b; margin-top: 5px;">Ключ хранится только в вашем браузере.</p>
    </div>

    <textarea id="inputText" placeholder="Вставьте текст для анализа..."></textarea>
    <button id="btn" onclick="runAI()">Найти главную мысль</button>

    <div id="result">
        <b style="color:var(--accent);">ИТОГ:</b>
        <p id="summaryText"></p>
    </div>
</div>

<script>
    // Загружаем ключ из памяти браузера, если он там есть
    document.getElementById('apiKey').value = localStorage.getItem('hf_key') || '';

    async function runAI() {
        const key = document.getElementById('apiKey').value;
        const text = document.getElementById('inputText').value;
        const btn = document.getElementById('btn');
        const summaryText = document.getElementById('summaryText');

        if (!key.startsWith('hf_')) {
            alert("Введите корректный ключ Hugging Face!");
            return;
        }

        // Сохраняем ключ, чтобы не вводить снова
        localStorage.setItem('hf_key', key);

        btn.disabled = true;
        btn.innerText = "Связь с ИИ...";

        try {
            const response = await fetch("https://api-inference.huggingface.co/models/IlyaGusev/mbart_ru_sum_gazeta", {
                method: "POST",
                headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: text })
            });

            const data = await response.json();

            if (data.error && data.error.includes("loading")) {
                btn.innerText = "ИИ просыпается (5 сек)...";
                setTimeout(runAI, 5000);
            } else if (data[0] && data[0].summary_text) {
                document.getElementById('result').style.display = 'block';
                summaryText.innerText = data[0].summary_text;
            } else {
                alert("Ошибка! Проверьте, не заблокирован ли ваш ключ на Hugging Face.");
            }
        } catch (e) {
            alert("Ошибка сети.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Найти главную мысль";
        }
    }
</script>
</body>
</html>
