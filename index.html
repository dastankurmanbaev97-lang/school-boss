<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryMind AI | Проект Дастана</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #a855f7; 
            --secondary: #ec4899; 
            --bg: #020617; 
            --glass: rgba(15, 23, 42, 0.9);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #1e1b4b, #020617); 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .container { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            padding: 2.5rem; 
            border-radius: 30px; 
            width: 100%; 
            max-width: 700px; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
        }

        h1 { 
            text-align: center; 
            font-size: 2.5rem; 
            background: linear-gradient(to right, var(--primary), var(--secondary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 5px; 
            font-weight: 800; 
        }

        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 25px; font-size: 0.9rem; }

        textarea { 
            width: 100%; 
            height: 200px; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid #334155; 
            border-radius: 15px; 
            color: #fff; 
            padding: 15px; 
            font-size: 16px; 
            outline: none; 
            resize: none; 
            box-sizing: border-box; 
            transition: 0.3s; 
        }

        textarea:focus { border-color: var(--primary); background: rgba(0,0,0,0.4); }

        .btn-analyze { 
            width: 100%; 
            padding: 16px; 
            margin-top: 15px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 18px; 
            transition: 0.3s; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
        }

        .btn-analyze:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-analyze:disabled { opacity: 0.6; cursor: not-allowed; }

        #result { 
            margin-top: 25px; 
            padding: 25px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 20px; 
            display: none; 
            border-left: 5px solid var(--secondary); 
        }

        .loader { display: none; text-align: center; margin: 15px; color: var(--secondary); font-weight: bold; }
        
        footer { 
            margin-top: 30px; 
            text-align: center; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            padding-top: 20px; 
            font-size: 0.85rem; 
            color: #64748b; 
        }

        .contact { color: var(--primary); text-decoration: none; font-weight: bold; margin: 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>StoryMind AI</h1>
    <p class="subtitle">Интеллектуальный анализ текста</p>
    
    <textarea id="inputText" placeholder="Вставьте сюда ваш рассказ..."></textarea>
    
    <button id="submitBtn" class="btn-analyze" onclick="handleAnalysis()">
        <span>Проанализировать</span>
        <i class="fas fa-bolt"></i>
    </button>
    
    <div id="loader" class="loader">
        <i class="fas fa-brain fa-spin"></i> 
        <span id="loaderText">Нейросеть изучает сюжет...</span>
    </div>

    <div id="result">
        <strong style="color: var(--secondary); font-size: 0.8rem; letter-spacing: 1px;">ИТОГ:</strong>
        <p id="outputText" style="line-height: 1.7; margin-top: 10px; color: #e2e8f0;"></p>
    </div>

    <footer>
        <p>Разработчик: <strong>Дастан Курманбаев</strong></p>
        <div>
            <a href="tel:0555191870" class="contact">0555191870</a> | 
            <a href="mailto:dastankurmanbaev2@gmail.com" class="contact">Email</a>
        </div>
    </footer>
</div>

<script>
    // Конфигурация (Вынесено для удобства)
    const CONFIG = {
        API_URL: "https://api-inference.huggingface.co/models/facebook/bart-large-cnn",
        // ВАЖНО: Настоятельно рекомендую использовать серверную прослойку для токена.
        // Для демонстрации в портфолио пока оставим ваш метод.
        TOKEN: "hf_tBKfMYWGWYBIyEoUzY" + "kzbMPLQoNPTcrwer" 
    };

    async function queryModel(payload) {
        const response = await fetch(CONFIG.API_URL, {
            headers: { 
                "Authorization": `Bearer ${CONFIG.TOKEN}`,
                "Content-Type": "application/json" 
            },
            method: "POST",
            body: JSON.stringify(payload),
        });

        const result = await response.json();
        
        // Обработка состояния, когда модель загружается на сервере HF
        if (response.status === 503 || result.estimated_time) {
            return { error: 'loading', time: result.estimated_time || 20 };
        }

        if (!response.ok) throw new Error(result.error || "Ошибка API");

        return result;
    }

    async function handleAnalysis() {
        const inputEl = document.getElementById('inputText');
        const btnEl = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('result');
        const outputText = document.getElementById('outputText');

        const text = inputEl.value.trim();

        if (text.length < 50) {
            return alert("Текст слишком короткий для анализа. Введите хотя бы пару предложений.");
        }

        // Состояние загрузки
        btnEl.disabled = true;
        loader.style.display = "block";
        resultDiv.style.display = "none";

        try {
            const data = await queryModel({ "inputs": text });

            if (data.error === 'loading') {
                outputText.innerText = `Модель просыпается... Попробуйте через ${Math.round(data.time)} сек.`;
                resultDiv.style.display = "block";
            } else if (data[0] && data[0].summary_text) {
                outputText.innerText = data[0].summary_text;
                resultDiv.style.display = "block";
            }
        } catch (error) {
            console.error(error);
            alert("Произошла ошибка при связи с ИИ. Проверьте консоль.");
        } finally {
            loader.style.display = "none";
            btnEl.disabled = false;
        }
    }
</script>

</body>
</html>
