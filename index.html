<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryMind AI | Проект Дастана</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #a855f7; 
            --secondary: #ec4899; 
            --bg: #020617; 
            --glass: rgba(15, 23, 42, 0.9);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #1e1b4b, #020617); 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .container { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            padding: 2.5rem; 
            border-radius: 30px; 
            width: 100%; 
            max-width: 700px; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
        }

        h1 { 
            text-align: center; 
            font-size: 2.5rem; 
            background: linear-gradient(to right, var(--primary), var(--secondary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 5px; 
            font-weight: 800; 
        }

        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 25px; font-size: 0.9rem; }

        textarea { 
            width: 100%; 
            height: 200px; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid #334155; 
            border-radius: 15px; 
            color: #fff; 
            padding: 15px; 
            font-size: 16px; 
            outline: none; 
            resize: none; 
            box-sizing: border-box; 
            transition: 0.3s; 
        }

        textarea:focus { border-color: var(--primary); background: rgba(0,0,0,0.4); }

        .btn-analyze { 
            width: 100%; 
            padding: 16px; 
            margin-top: 15px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 18px; 
            transition: 0.3s; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
        }

        .btn-analyze:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-analyze:disabled { opacity: 0.6; cursor: not-allowed; }

        #result { 
            margin-top: 25px; 
            padding: 25px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 20px; 
            display: none; 
            border-left: 5px solid var(--secondary); 
        }

        .loader { display: none; text-align: center; margin: 15px; color: var(--secondary); font-weight: bold; }
        
        .progress-bar {
            width: 0%;
            height: 4px;
            background: var(--secondary);
            margin-top: 10px;
            border-radius: 2px;
            transition: width 0.3s;
        }

        footer { 
            margin-top: 30px; 
            text-align: center; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            padding-top: 20px; 
            font-size: 0.85rem; 
            color: #64748b; 
        }

        .contact { color: var(--primary); text-decoration: none; font-weight: bold; margin: 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>StoryMind AI</h1>
    <p class="subtitle">Интеллектуальный локальный анализ текста</p>
    
    <textarea id="inputText" placeholder="Вставьте сюда ваш текст (минимум 50 символов)..."></textarea>
    
    <button id="submitBtn" class="btn-analyze" onclick="handleAnalysis()">
        <span>Запустить нейросеть</span>
        <i class="fas fa-bolt"></i>
    </button>
    
    <div id="loader" class="loader">
        <i class="fas fa-brain fa-spin"></i> 
        <span id="loaderText">Подготовка...</span>
        <div id="progress" class="progress-bar"></div>
    </div>

    <div id="result">
        <strong style="color: var(--secondary); font-size: 0.8rem; letter-spacing: 1px;">ГЛАВНАЯ МЫСЛЬ:</strong>
        <p id="outputText" style="line-height: 1.7; margin-top: 10px; color: #e2e8f0;"></p>
    </div>

    <footer>
        <p>Разработчик: <strong>Дастан Курманбаев</strong></p>
        <div>
            <a href="tel:0555191870" class="contact">0555191870</a> | 
            <a href="mailto:dastankurmanbaev2@gmail.com" class="contact">Email</a>
        </div>
    </footer>
</div>

<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
    
    // Настройка для работы в браузере
    env.allowLocalModels = false;
    
    let summarizer = null;

    window.handleAnalysis = async function() {
        const inputEl = document.getElementById('inputText');
        const btnEl = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('result');
        const outputText = document.getElementById('outputText');
        const loaderText = document.getElementById('loaderText');
        const progress = document.getElementById('progress');

        const text = inputEl.value.trim();

        if (text.length < 50) {
            alert("Пожалуйста, введите текст подлиннее для корректного анализа.");
            return;
        }

        btnEl.disabled = true;
        loader.style.display = "block";
        resultDiv.style.display = "none";

        try {
            if (!summarizer) {
                loaderText.innerText = "Загрузка модели ИИ (только первый раз)...";
                
                // Используем Xenova/distilbart-cnn-6-6 — она отлично подходит для суммаризации
                summarizer = await pipeline('summarization', 'Xenova/distilbart-cnn-6-6', {
                    progress_callback: (data) => {
                        if (data.status === 'progress') {
                            progress.style.width = `${data.progress}%`;
                        }
                    }
                });
            }

            loaderText.innerText = "Нейросеть извлекает главное...";
            progress.style.width = "100%";

            const output = await summarizer(text, {
                max_new_tokens: 100,
                chunk_length: 512,
                iteration: 1
            });

            outputText.innerText = output[0].summary_text;
            resultDiv.style.display = "block";

        } catch (error) {
            console.error(error);
            alert("Произошла ошибка при запуске модели. Попробуйте обновить страницу.");
        } finally {
            loader.style.display = "none";
            btnEl.disabled = false;
            progress.style.width = "0%";
        }
    }
</script>

</body>
</html>
