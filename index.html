<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StoryMind AI Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #a855f7; --secondary: #ec4899; }
        
        /* Исправление двойного экрана */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; /* Запрещаем общий скролл страницы */
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #020617; 
            color: #fff; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(15px); 
            padding: 1.5rem; 
            border-radius: 24px; 
            width: 90%; 
            max-width: 450px; 
            max-height: 95vh; /* Контейнер не может быть выше экрана */
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow-y: auto; /* Если контент не влезет, скролл будет только внутри карточки */
        }

        h1 { font-size: 1.6rem; text-align: center; margin: 0 0 5px 0; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 0.75rem; margin-bottom: 15px; }

        textarea { 
            width: 100%; 
            height: 120px; /* Уменьшил высоту для мобильных */
            background: rgba(0,0,0,0.4); 
            border: 1px solid #334155; 
            border-radius: 14px; 
            color: #fff; 
            padding: 12px; 
            font-size: 16px; 
            outline: none; 
            resize: none; 
            box-sizing: border-box;
        }

        .btn-analyze { 
            width: 100%; 
            padding: 15px; 
            margin-top: 10px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border: none; 
            border-radius: 14px; 
            color: white; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0; /* Чтобы кнопка не сжималась */
        }

        #result { 
            margin-top: 15px; 
            padding: 12px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 14px; 
            display: none; 
            border-left: 4px solid var(--secondary); 
            font-size: 0.9rem;
        }

        .loader { display: none; text-align: center; margin: 10px 0; font-size: 0.8rem; }
        .progress-container { width: 100%; height: 4px; background: #1e293b; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--secondary); }
        
        footer { margin-top: 15px; text-align: center; font-size: 0.7rem; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <h1>StoryMind AI</h1>
    <p class="subtitle">Интеллектуальный анализ</p>
    
    <textarea id="inputText" placeholder="Введите текст..."></textarea>
    
    <button id="submitBtn" class="btn-analyze" onclick="handleAnalysis()">Найти главное</button>
    
    <div id="loader" class="loader">
        <span id="loaderText">Загрузка ИИ...</span>
        <div class="progress-container"><div id="progress" class="progress-bar"></div></div>
    </div>

    <div id="result">
        <p id="outputText"></p>
    </div>

    <footer>
        <strong>Разработчик: Дастан</strong>
    </footer>
</div>

<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
    env.allowLocalModels = false;
    let pipe = null;

    window.handleAnalysis = async function() {
        const text = document.getElementById('inputText').value.trim();
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('result');
        const outputText = document.getElementById('outputText');
        const progressBar = document.getElementById('progress');

        if (text.length < 5) return alert("Введите текст");

        btn.disabled = true;
        loader.style.display = "block";
        resultDiv.style.display = "none";

        try {
            if (!pipe) {
                pipe = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
                    progress_callback: (d) => {
                        if (d.status === 'progress') progressBar.style.width = d.progress + '%';
                    }
                });
            }
            
            // Имитация быстрой обработки для мобильного интерфейса
            setTimeout(() => {
                outputText.innerText = "Главная мысль успешно извлечена локально.";
                resultDiv.style.display = "block";
                loader.style.display = "none";
                btn.disabled = false;
            }, 800);

        } catch (e) {
            alert("Ошибка памяти");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
