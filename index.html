<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryAnalyzer AI | Твой личный литературный критик</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #f472b6; /* Розовый акцент */
            --secondary: #8b5cf6; /* Фиолетовый */
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b, #020617);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 750px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            background: linear-gradient(to right, #f472b6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 18px;
            color: #fff;
            padding: 20px;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(244, 114, 182, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        #result {
            margin-top: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border-left: 6px solid var(--primary);
            display: none;
            line-height: 1.7;
        }

        .story-label {
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.8rem;
            display: block;
            margin-bottom: 10px;
        }

        .summary-part {
            margin-bottom: 15px;
        }

        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #334155;
            text-align: center;
        }

        .contact-link {
            color: var(--primary);
            text-decoration: none;
            margin: 0 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>StoryAnalyzer</h1>
    <p class="subtitle">Превращаем текст в связный рассказ</p>
    
    <textarea id="inputText" placeholder="Вставьте сюда вашу историю (например, про Софию)..."></textarea>
    
    <button onclick="analyzeStory()">Узнать, о чем рассказ</button>

    <div id="result">
        <span class="story-label"><i class="fas fa-book-open"></i> Суть истории:</span>
        <div id="summaryOutput"></div>
    </div>

    <footer>
        <p style="color: #64748b; font-size: 0.85rem;">Разработчик: Дастан</p>
        <a href="tel:0555191870" class="contact-link">0555191870</a>
        <a href="mailto:dastankurmanbaev2@gmail.com" class="contact-link">Email</a>
    </footer>
</div>

<script>
    function analyzeStory() {
        const text = document.getElementById('inputText').value;
        if (text.length < 50) {
            alert("Пожалуйста, добавьте больше текста для анализа.");
            return;
        }

        const sentences = text.match(/[^\.!\?]+[\.!\?]+/g) || [text];
        
        // Поиск имен (Слова с большой буквы не в начале предложения)
        let names = text.match(/[А-Я][а-я]+/g) || ["Герой"];
        let mainHero = names.filter(n => n.length > 3)[0] || "Главный герой";

        // Поиск описательных слов (прилагательных) - упрощенно
        const words = text.toLowerCase().match(/[а-я]+/g);
        const keywords = words.filter(w => w.length > 5).slice(0, 5);

        // Формируем "рассказ о рассказе"
        let intro = `Это рассказ о герое по имени <strong>${mainHero}</strong>. `;
        let character = `В тексте подчеркивается её/его связь с такими понятиями, как <em>${keywords[0]}</em> и <em>${keywords[1]}</em>. `;
        let action = `Автор описывает важные события: "${sentences[Math.floor(sentences.length/2)].trim()}". `;
        let ending = `История завершается тем, что: "${sentences[sentences.length-1].trim()}"`;

        const finalHTML = `
            <div class="summary-part">${intro}</div>
            <div class="summary-part">${character}</div>
            <div class="summary-part">${action}</div>
            <div class="summary-part" style="color: #cbd5e1;">${ending}</div>
        `;

        document.getElementById('result').style.display = 'block';
        document.getElementById('summaryOutput').innerHTML = finalHTML;
    }
</script>

</body>
</html>
