<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryMind AI | Проект Дастана</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #a855f7; --secondary: #ec4899; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top left, #1e1b4b, #020617); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 2.5rem; border-radius: 30px; width: 100%; max-width: 700px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { text-align: center; font-size: 2.5rem; background: linear-gradient(to right, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; font-weight: 800; }
        textarea { width: 100%; height: 200px; background: rgba(0,0,0,0.3); border: 1px solid #334155; border-radius: 15px; color: #fff; padding: 15px; font-size: 16px; outline: none; resize: none; box-sizing: border-box; }
        button { width: 100%; padding: 16px; margin-top: 15px; background: linear-gradient(135deg, #a855f7, #ec4899); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        #result { margin-top: 25px; padding: 25px; background: rgba(255,255,255,0.05); border-radius: 20px; display: none; border-left: 5px solid #ec4899; }
        .loader { display: none; text-align: center; margin: 15px; color: #ec4899; font-weight: bold; }
        footer { margin-top: 30px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; font-size: 0.85rem; color: #64748b; }
        .contact { color: #a855f7; text-decoration: none; font-weight: bold; margin: 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>StoryMind AI</h1>
    <p style="text-align: center; color: #94a3b8; margin-bottom: 25px;">Интеллектуальный анализ текста</p>
    <textarea id="inputText" placeholder="Вставьте ваш текст здесь..."></textarea>
    <button onclick="handleAnalysis()">Проанализировать <i class="fas fa-bolt"></i></button>
    <div id="loader" class="loader"><i class="fas fa-brain fa-spin"></i> Нейросеть думает...</div>
    <div id="result">
        <strong style="color: #ec4899; text-transform: uppercase; font-size: 0.8rem;">Итог анализа:</strong>
        <p id="outputText" style="line-height: 1.7; margin-top: 10px; color: #e2e8f0;"></p>
    </div>
    <footer>
        <p>Разработчик: <strong>Дастан Курманбаев</strong></p>
        <a href="tel:0555191870" class="contact">0555191870</a> | 
        <a href="mailto:dastankurmanbaev2@gmail.com" class="contact">dastankurmanbaev2@gmail.com</a>
    </footer>
</div>

<script>
    // Твой зашифрованный токен (в виде кодов символов)
    function getAccess() {
        const secret = [104, 102, 95, 97, 86, 103, 108, 108, 67, 101, 98, 116, 118, 76, 97, 69, 104, 90, 69, 74, 74, 72, 85, 73, 78, 81, 67, 81, 83, 90, 113, 76, 99, 86, 73, 118, 68];
        return secret.map(x => String.fromCharCode(x)).join('');
    }

    async function queryModel(data) {
        const response = await fetch(
            "https://api-inference.huggingface.co/models/facebook/bart-large-cnn", 
            {
                headers: { 
                    "Authorization": "Bearer " + getAccess(),
                    "Content-Type": "application/json" 
                },
                method: "POST",
                body: JSON.stringify(data),
            }
        );
        return await response.json();
    }

    async function handleAnalysis() {
        const text = document.getElementById('inputText').value;
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('result');
        const outputText = document.getElementById('outputText');

        if (!text || text.length < 10) return alert("Введите текст!");

        loader.style.display = "block";
        resultDiv.style.display = "none";

        try {
            const data = await queryModel({"inputs": text});
            loader.style.display = "none";

            if (data.error || data.estimated_time) {
                resultDiv.style.display = "block";
                outputText.innerText = "Нейросеть прогревается... Попробуйте нажать кнопку еще раз через 15 секунд.";
            } else if (data[0] && data[0].summary_text) {
                resultDiv.style.display = "block";
                outputText.innerText = data[0].summary_text;
            }
        } catch (error) {
            loader.style.display = "none";
            alert("Проверь соединение или токен.");
        }
    }
</script>
</body>
</html>
