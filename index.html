<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryMind AI | Профессиональный пересказ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #f472b6;
            --bg: #020617;
            --card: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 700px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            background: linear-gradient(to right, #f472b6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            padding: 15px;
            font-size: 16px;
            outline: none;
            resize: none;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: linear-gradient(135deg, #f472b6, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            display: none;
            line-height: 1.6;
            border-left: 4px solid var(--primary);
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: var(--primary);
        }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem;
            border-top: 1px solid #334155;
            padding-top: 15px;
        }

        .contact { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>StoryMind AI</h1>
    <p style="text-align: center; color: #94a3b8;">Вставьте текст, и я напишу красивый пересказ</p>
    
    <textarea id="inputText" placeholder="Напишите историю здесь..."></textarea>
    
    <button id="mainBtn" onclick="askAI()">Проанализировать глубоко</button>
    <div id="loader" class="loader"><i class="fas fa-spinner fa-spin"></i> Думаю...</div>

    <div id="result" id="output">
        <strong style="color: var(--primary); display: block; margin-bottom: 10px;">АНАЛИЗ ИСТОРИИ:</strong>
        <div id="aiText"></div>
    </div>

    <footer>
        <p>Разработчик: Дастан</p>
        <a href="tel:0555191870" class="contact">0555191870</a> | 
        <a href="mailto:dastankurmanbaev2@gmail.com" class="contact">dastankurmanbaev2@gmail.com</a>
    </footer>
</div>

<script>
    async function askAI() {
        const text = document.getElementById('inputText').value;
        const resultDiv = document.getElementById('result');
        const aiText = document.getElementById('aiText');
        const loader = document.getElementById('loader');

        if (!text) return alert("Введите текст!");

        loader.style.display = "block";
        resultDiv.style.display = "none";

        // ТВОЙ API KEY ВСТАВЛЯТЬ СЮДА (между кавычек)
        const API_KEY = "ВСТАВЬ_СЮДА_СВОЙ_КЛЮЧ"; 

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Напиши очень краткий и красивый пересказ этого текста в формате: 'Это рассказ о [герой]. В нем говорится о [суть]. Все заканчивается тем, что [финал]'. Текст: ${text}` }] }]
                })
            });

            const data = await response.json();
            const result = data.candidates[0].content.parts[0].text;

            loader.style.display = "none";
            resultDiv.style.display = "block";
            aiText.innerText = result;

        } catch (error) {
            loader.style.display = "none";
            alert("Нужен API ключ, чтобы магия сработала!");
            console.error(error);
        }
    }
</script>

</body>
</html>
