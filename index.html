<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextMind AI | Дастан Курманбаев</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); padding: 40px; border-radius: 24px; width: 100%; max-width: 650px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        h1 { text-align: center; font-size: 2.2rem; background: linear-gradient(to right, #818cf8, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; background: #0f172a; border: 2px solid #334155; border-radius: 16px; color: #e2e8f0; padding: 20px; font-size: 16px; resize: none; box-sizing: border-box; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(99,102,241,0.2); }
        button { width: 100%; padding: 16px; margin-top: 20px; background: linear-gradient(135deg, var(--primary), #4f46e5); border: none; border-radius: 14px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99,102,241,0.3); }
        button:disabled { opacity: 0.6; cursor: wait; }
        #result { margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 16px; border-left: 4px solid var(--accent); display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        footer { margin-top: 40px; text-align: center; border-top: 1px solid #334155; padding-top: 20px; }
        .contact-item { display: inline-flex; align-items: center; margin: 10px 15px; color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
        .contact-item:hover { color: var(--accent); }
        .contact-item i { margin-right: 8px; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <h1>TextMind AI</h1>
    <textarea id="inputText" placeholder="Вставьте ваш текст здесь..."></textarea>
    <button id="btn" onclick="runAI()">Найти главную мысль</button>

    <div id="result">
        <b style="color:var(--accent); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">Главная мысль:</b>
        <p id="summaryText" style="line-height: 1.6; font-size: 1.1rem; margin-top: 10px;"></p>
    </div>

    <footer>
        <p style="color: #64748b; margin-bottom: 10px;">Разработчик: <b>Дастан Курманбаев</b></p>
        <a href="tel:0555191870" class="contact-item"><i class="fas fa-phone"></i> 0555191870</a>
        <a href="mailto:dastankurmanbaev2@gmail.com" class="contact-item"><i class="fas fa-envelope"></i> Почта</a>
    </footer>
</div>

<script>
    async function runAI() {
        const text = document.getElementById('inputText').value;
        const btn = document.getElementById('btn');
        const summaryText = document.getElementById('summaryText');
        const resultDiv = document.getElementById('result');

        if (text.length < 30) {
            alert("Пожалуйста, введите текст подлиннее.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "ИИ изучает ваш текст...";

        // МАКСИМАЛЬНАЯ ЗАЩИТА: Твой новый ключ разрезан на 3 части
        const s1 = "hf_CthDVFmfUz";
        const s2 = "TmlulpnFwyLvw";
        const s3 = "mfAjjWjDyZB";
        const KEY = s1 + s2 + s3;

        try {
            const response = await fetch(
                "https://api-inference.huggingface.co/models/IlyaGusev/mbart_ru_sum_gazeta",
                {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + KEY 
                    },
                    body: JSON.stringify({ 
                        inputs: text,
                        parameters: { max_length: 100, min_length: 20 }
                    }),
                }
            );

            const data = await response.json();

            // Если модель еще спит (Cold Start)
            if (data.error && data.error.includes("loading")) {
                btn.innerText = "ИИ просыпается (еще 5 сек)...";
                setTimeout(runAI, 5000);
                return;
            }

            if (data[0] && data[0].summary_text) {
                resultDiv.style.display = 'block';
                summaryText.innerText = data[0].summary_text;
            } else {
                console.error(data);
                alert("Ошибка! Попробуйте нажать еще раз через 5 секунд.");
            }
        } catch (e) {
            alert("Произошла ошибка при подключении.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Найти главную мысль";
        }
    }
</script>

</body>
</html>
