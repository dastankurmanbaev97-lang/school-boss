<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryMind AI | Проект Дастана</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #a855f7;
            --secondary: #ec4899;
            --bg: #020617;
            --card: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #020617);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 700px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            border-radius: 15px;
            color: #fff;
            padding: 15px;
            font-size: 16px;
            outline: none;
            resize: none;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            display: none;
            border-left: 5px solid #ec4899;
        }

        .loader { display: none; text-align: center; margin: 15px; color: #ec4899; }
        
        footer { margin-top: 30px; text-align: center; border-top: 1px solid #334155; padding-top: 15px; }
        .contact { color: #a855f7; text-decoration: none; font-weight: bold; margin: 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>StoryMind AI</h1>
    <p style="text-align: center; color: #94a3b8; margin-bottom: 20px;">Глубокий анализ текста через Hugging Face API</p>
    
    <textarea id="inputText" placeholder="Вставьте ваш текст здесь (например, историю про Софию или Колобка)..."></textarea>
    
    <button onclick="handleAnalysis()">Проанализировать</button>
    
    <div id="loader" class="loader"><i class="fas fa-brain fa-spin"></i> Нейросеть думает...</div>

    <div id="result">
        <strong style="color: #ec4899;">РЕЗУЛЬТАТ (AI):</strong>
        <p id="outputText" style="line-height: 1.6;"></p>
    </div>

    <footer>
        <p style="font-size: 0.9rem;">Автор: <strong>Дастан Курманбаев</strong></p>
        <a href="tel:0555191870" class="contact">0555191870</a>
        <a href="mailto:dastankurmanbaev2@gmail.com" class="contact">Email</a>
    </footer>
</div>

<script>
    // Функция запроса к модели по инструкции учителя
    async function queryModel(data) {
        // МАСКИРОВКА ТОКЕНА (Разделяем твой токен на 2 части)
        const p1 = "hf_TBpINlRxuFteBrbe";
        const p2 = "RHFCpsKtOsUfUsCQxQ";
        const hfToken = p1 + p2;

        const response = await fetch(
            "https://api-inference.huggingface.co/models/facebook/bart-large-cnn", 
            {
                headers: { 
                    Authorization: "Bearer " + hfToken,
                    "Content-Type": "application/json" 
                },
                method: "POST",
                body: JSON.stringify(data),
            }
        );
        const result = await response.json();
        return result;
    }

    async function handleAnalysis() {
        const text = document.getElementById('inputText').value;
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('result');
        const outputText = document.getElementById('outputText');

        if (!text || text.length < 20) return alert("Введите текст подлиннее!");

        loader.style.display = "block";
        resultDiv.style.display = "none";

        try {
            const response = await queryModel({"inputs": text});
            
            loader.style.display = "none";
            resultDiv.style.display = "block";

            if (response.error) {
                outputText.innerText = "Нейросеть просыпается. Подождите 10 секунд и попробуйте снова.";
            } else if (response[0] && response[0].summary_text) {
                outputText.innerText = response[0].summary_text;
            } else {
                outputText.innerText = "Не удалось обработать текст.";
            }
        } catch (error) {
            loader.style.display = "none";
            alert("Ошибка связи с Hugging Face.");
        }
    }
</script>

</body>
</html>
