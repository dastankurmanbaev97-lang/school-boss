<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StoryMind AI | Real Analysis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #a855f7; --secondary: #ec4899; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #020617; }
        body { font-family: 'Inter', sans-serif; color: #fff; display: flex; align-items: center; justify-content: center; }

        .container { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(15px); 
            padding: 1.5rem; 
            border-radius: 24px; 
            width: 90%; 
            max-width: 450px; 
            max-height: 90vh; 
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow-y: auto; 
        }

        h1 { font-size: 1.6rem; text-align: center; margin: 0; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 0.75rem; margin-bottom: 15px; }

        textarea { 
            width: 100%; height: 100px; background: rgba(0,0,0,0.4); 
            border: 1px solid #334155; border-radius: 14px; color: #fff; 
            padding: 12px; font-size: 16px; outline: none; resize: none; box-sizing: border-box;
        }

        .btn-analyze { 
            width: 100%; padding: 15px; margin-top: 10px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border: none; border-radius: 14px; color: white; font-weight: bold; font-size: 16px;
        }
        .btn-analyze:disabled { opacity: 0.5; }

        #result { 
            margin-top: 15px; padding: 12px; background: rgba(255,255,255,0.05); 
            border-radius: 14px; display: none; border-left: 4px solid var(--secondary); 
        }
        #outputText { font-size: 0.9rem; line-height: 1.5; color: #e2e8f0; margin: 0; }

        .loader { display: none; text-align: center; margin: 10px 0; font-size: 0.8rem; color: var(--secondary); }
        .progress-container { width: 100%; height: 4px; background: #1e293b; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--secondary); transition: width 0.2s; }
        
        footer { margin-top: 15px; text-align: center; font-size: 0.7rem; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <h1>StoryMind AI</h1>
    <p class="subtitle">Реальный ИИ-анализ текста</p>
    
    <textarea id="inputText" placeholder="Введите текст для анализа (желательно на английском)..."></textarea>
    
    <button id="submitBtn" class="btn-analyze" onclick="handleAnalysis()">Вывести главную мысль</button>
    
    <div id="loader" class="loader">
        <span id="loaderText">Загрузка нейросети...</span>
        <div class="progress-container"><div id="progress" class="progress-bar"></div></div>
    </div>

    <div id="result">
        <strong style="color:var(--secondary); font-size:0.7rem;">РЕЗУЛЬТАТ:</strong>
        <p id="outputText"></p>
    </div>

    <footer><strong>Разработчик: Дастан</strong></footer>
</div>

<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
    
    env.allowLocalModels = false;
    let summarizer = null;

    window.handleAnalysis = async function() {
        const input = document.getElementById('inputText').value.trim();
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('result');
        const outputText = document.getElementById('outputText');
        const progressBar = document.getElementById('progress');
        const loaderText = document.getElementById('loaderText');

        if (input.length < 20) return alert("Введите хотя бы одно длинное предложение");

        btn.disabled = true;
        loader.style.display = "block";
        resultDiv.style.display = "none";

        try {
            if (!summarizer) {
                loaderText.innerText = "Первый запуск: скачивание модели...";
                summarizer = await pipeline('summarization', 'Xenova/distilbart-cnn-6-6', {
                    progress_callback: (d) => {
                        if (d.status === 'progress') progressBar.style.width = d.progress + '%';
                    }
                });
            }

            loaderText.innerText = "Нейросеть думает...";
            
            // Реальный запуск модели
            const output = await summarizer(input, {
                max_new_tokens: 60,
                min_length: 10,
                do_sample: false
            });

            // Выводим настоящий результат
            outputText.innerText = output[0].summary_text;
            resultDiv.style.display = "block";

        } catch (e) {
            console.error(e);
            alert("Ошибка: модели нужно больше памяти или пропал интернет.");
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
