<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextMind AI | Local Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); padding: 40px; border-radius: 24px; width: 100%; max-width: 600px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { text-align: center; background: linear-gradient(to right, #818cf8, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; font-size: 2.2rem; }
        textarea { width: 100%; height: 200px; background: #0f172a; border: 2px solid #334155; border-radius: 16px; color: #fff; padding: 15px; font-size: 16px; resize: none; box-sizing: border-box; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--accent); }
        button { width: 100%; padding: 16px; margin-top: 20px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #4f46e5; transform: translateY(-2px); }
        #result { margin-top: 25px; padding: 20px; background: rgba(56, 189, 248, 0.1); border-radius: 16px; border-left: 4px solid var(--accent); display: none; }
        footer { margin-top: 30px; text-align: center; color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>TextMind AI</h1>
    <p style="text-align:center; color:#94a3b8; margin-bottom:20px;">Локальный анализ текста (без API ключей)</p>

    <textarea id="inputText" placeholder="Вставьте текст (например, школьный доклад или статью)..."></textarea>
    <button onclick="analyzeText()">Найти главную мысль</button>

    <div id="result">
        <b style="color:var(--accent); text-transform: uppercase; font-size: 0.8rem;">Краткое содержание:</b>
        <p id="summaryText" style="line-height: 1.6; margin-top: 10px;"></p>
    </div>

    <footer>
        <p>Разработчик: <b>Дастан Курманбаев</b></p>
    </footer>
</div>

<script>
    function analyzeText() {
        const text = document.getElementById('inputText').value.trim();
        const resultDiv = document.getElementById('result');
        const summaryText = document.getElementById('summaryText');

        if (text.length < 50) {
            alert("Текст слишком короткий для анализа!");
            return;
        }

        // 1. Разбиваем текст на предложения
        const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
        
        if (sentences.length <= 2) {
            summaryText.innerText = text;
        } else {
            // 2. Считаем частоту слов (упрощенно)
            const words = text.toLowerCase().match(/[а-яёa-z]+/g) || [];
            const freq = {};
            words.forEach(word => {
                if (word.length > 3) freq[word] = (freq[word] || 0) + 1;
            });

            // 3. Оцениваем каждое предложение по важности слов
            const scoredSentences = sentences.map(s => {
                let score = 0;
                const sWords = s.toLowerCase().match(/[а-яёa-z]+/g) || [];
                sWords.forEach(w => { if (freq[w]) score += freq[w]; });
                return { text: s.trim(), score: score };
            });

            // 4. Выбираем 2 самых важных предложения
            scoredSentences.sort((a, b) => b.score - a.score);
            const bestSentences = scoredSentences.slice(0, 2)
                .sort((a, b) => sentences.indexOf(a.text) - sentences.indexOf(b.text));

            summaryText.innerText = bestSentences.map(s => s.text).join(' ');
        }

        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
