<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextMind AI | Профессиональный Анализатор</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 750px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        /* Декор фона */
        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99,102,241,0.05) 0%, transparent 70%);
            z-index: 0;
        }

        h1 {
            position: relative;
            text-align: center;
            font-size: 2.5rem;
            background: linear-gradient(to right, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            position: relative;
            text-align: center;
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        textarea {
            position: relative;
            width: 100%;
            height: 220px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 16px;
            color: #e2e8f0;
            padding: 20px;
            font-size: 16px;
            line-height: 1.5;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
            background: #111b2e;
        }

        button {
            position: relative;
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        /* Спиннер загрузки */
        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #result {
            margin-top: 30px;
            padding: 25px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            border-left: 4px solid var(--accent);
            display: none;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .summary-header {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        #summaryText {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #f1f5f9;
        }

        footer {
            position: relative;
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid #334155;
            text-align: center;
        }

        .contact-item {
            display: inline-flex;
            align-items: center;
            margin: 10px 15px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .contact-item:hover {
            color: var(--accent);
        }

        .contact-item i { margin-right: 8px; }

    </style>
</head>
<body>

<div class="container">
    <h1>TextMind AI</h1>
    <p class="subtitle">Нейросетевой анализ главной мысли текста</p>
    
    <textarea id="inputText" placeholder="Вставьте текст (статью, рассказ или новость)..."></textarea>
    
    <button id="btn" onclick="analyzeWithAI()">
        <span id="btnText">Сгенерировать вывод</span>
        <div class="loader" id="loader"></div>
    </button>

    <div id="result">
        <div class="summary-header">
            <i class="fas fa-brain"></i> Результат анализа нейросетью
        </div>
        <p id="summaryText"></p>
    </div>

    <footer>
        <p style="color: #64748b; font-size: 0.8rem; margin-bottom: 15px;">Разработка интеллектуальных систем:</p>
        <a href="tel:0555191870" class="contact-item"><i class="fas fa-phone"></i> 0555191870</a>
        <a href="mailto:dastankurmanbaev2@gmail.com" class="contact-item"><i class="fas fa-envelope"></i> dastankurmanbaev2@gmail.com</a>
    </footer>
</div>

<script>
    async function analyzeWithAI() {
        const textInput = document.getElementById('inputText').value;
        const btn = document.getElementById('btn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const resultDiv = document.getElementById('result');
        const summaryText = document.getElementById('summaryText');

        if (textInput.length < 50) {
            alert("Пожалуйста, введите более длинный текст (хотя бы пару предложений) для качественного анализа.");
            return;
        }

        // Включаем режим загрузки
        btn.disabled = true;
        loader.style.display = 'block';
        btnText.innerText = 'Нейросеть думает...';
        resultDiv.style.display = 'none';

        try {
            // Используем модель mBART для русского языка через API Hugging Face
            // Примечание: В реальном проекте лучше создать бесплатный API Token на HuggingFace и вставить сюда
            const response = await fetch(
                "https://api-inference.huggingface.co/models/IlyaGusev/mbart_ru_sum_gazeta",
                {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: textInput }),
                }
            );

            const result = await response.json();

            if (result.error) {
                // Если модель еще загружается на сервере
                if (result.error.includes("loading")) {
                    btnText.innerText = "Модель просыпается, подождите 20 сек...";
                    setTimeout(analyzeWithAI, 15000); 
                    return;
                }
                throw new Error(result.error);
            }

            // Выводим результат
            summaryText.innerText = result[0].summary_text;
            resultDiv.style.display = 'block';

        } catch (error) {
            console.error(error);
            alert("Ошибка при подключении к ИИ. Попробуйте еще раз через минуту.");
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
            btnText.innerText = 'Сгенерировать вывод';
        }
    }
</script>

</body>
</html>
